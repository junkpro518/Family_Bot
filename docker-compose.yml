services:
  family-bot:
    build: .
    image: family-bot:latest
    container_name: family-bot
    restart: unless-stopped
    env_file: .env
    stop_grace_period: 30s

    volumes:
      - family_bot_data:/app/data

    deploy:
      resources:
        limits:
          memory: 256m
          cpus: '0.2'

    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  family_bot_data:
